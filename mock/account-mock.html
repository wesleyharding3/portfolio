<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>account-mock — chapter figure source</title>
<style>
  * { margin:0; box-sizing:border-box; }
  html,body { background:#fff; font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif; }
  #stage { width:900px; height:420px; position:relative; padding:50px 60px; }
  .lbl { position:absolute; top:16px; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#b3b0a8; }
  .row { display:flex; gap:56px; align-items:flex-start; height:100%; }
  .card { flex:1; border:1px solid rgba(0,0,0,0.14); padding:26px; }
  .card h3 { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#8a857c; margin-bottom:18px; font-weight:600; }
  .field { border:1px solid rgba(0,0,0,0.22); padding:12px 14px; font-size:13.5px; color:#1c1b19; margin-bottom:12px; }
  .field.ph { color:#a8a39a; }
  .btn { display:inline-block; background:#111; color:#fff; font-size:12px; letter-spacing:0.06em; padding:11px 18px; text-align:center; width:100%; box-sizing:border-box; }
  .sent { margin-top:14px; font-size:11.5px; color:#8a857c; }
  .sent b { color:#111; }
  .arrow { display:flex; align-items:center; justify-content:center; font-size:22px; color:#d8d5cc; align-self:center; }
  .sumrow { display:flex; justify-content:space-between; font-size:13px; padding:9px 0; border-bottom:1px solid rgba(0,0,0,0.08); color:#1c1b19; }
  .sumrow.total { font-weight:700; border-bottom:none; padding-top:12px; }
  .paid { margin-top:16px; display:flex; align-items:center; gap:8px; font-size:12px; color:#111; }
  .dot { width:7px; height:7px; border-radius:50%; background:#111; }
  .timer { position:absolute; bottom:26px; right:60px; font-size:11px; color:#8a857c; letter-spacing:0.03em; }
</style>
</head>
<body>
<div id="stage">
  <div class="row">
    <div class="card">
      <h3>Sign in</h3>
      <div class="field ph">you@email.com</div>
      <div class="btn">Send magic link</div>
      <p class="sent">Link sent. Click it, and you&rsquo;re in &mdash; <b>no password to remember.</b></p>
    </div>
    <div class="arrow">&rarr;</div>
    <div class="card">
      <h3>Checkout</h3>
      <div class="sumrow"><span>Waffle Tote &mdash; Ivory</span><span>$228.00</span></div>
      <div class="sumrow"><span>Shipping</span><span>Free</span></div>
      <div class="sumrow total"><span>Total</span><span>$228.00</span></div>
      <div class="paid"><span class="dot"></span> Paid &mdash; confirmation sent</div>
    </div>
  </div>
  <div class="timer">0:42 elapsed &mdash; link to paid</div>
</div>
</body>
</html>
