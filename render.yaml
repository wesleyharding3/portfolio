# Render Blueprint — static site (no build step).
# In Render: New → Blueprint → connect this repo, or New → Static Site and Render
# will read these settings automatically.
services:
  - type: web
    name: wesley-harding-portfolio
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
